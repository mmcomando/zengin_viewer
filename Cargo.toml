[package]
name = "my_bevy_game"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.0", features = ["free_camera", "tga"] }
# bevy = { version = "0.18.0", features = ["dynamic_linking", "free_camera"] }

ZenKitCAPI-sys = { path = "/home/pc/prog/experiments/2026_01/ZenKit-sys" }
ron = "0.12.0"
avian3d = "0.5.0"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

