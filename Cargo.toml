[package]
name = "ZenGinViewer"
version = "0.1.0"
edition = "2024"


[dependencies]
bevy = { version = "0.18.1", features = ["dynamic_linking", "bevy_dev_tools", "free_camera"] }
byteorder = "1.5"

ZenKit-rs = { git = "https://github.com/mmcomando/ZenKit-rs.git", rev = "76ddccaf63d8833d684d27e0e25b8ffbd205f805" }
ron = "0.12.0"
avian3d = "0.5.0"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

